version: "3.9"

# ── Named volumes ────────────────────────────────────────
volumes:
  mysql_data:

# ── Networks ─────────────────────────────────────────────
networks:
  frontend_net:
  backend_net:

services:

  # ── 1. DATABASE TIER ───────────────────────────────────
  db:
    image: mysql:8.3
    container_name: gardenapp_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${DB_NAME:-gardendb}
      MYSQL_USER:          ${DB_USER:-gardenuser}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-gardenpass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${DB_USER:-gardenuser}",
             "-p${DB_PASSWORD:-gardenpass}"]
      interval: 10s
      timeout:  5s
      retries:  10

  # ── 2. BACKEND TIER (Flask + Gunicorn) ─────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gardenapp_backend
    restart: unless-stopped
    environment:
      DB_HOST:     db
      DB_PORT:     3306
      DB_NAME:     ${DB_NAME:-gardendb}
      DB_USER:     ${DB_USER:-gardenuser}
      DB_PASSWORD: ${DB_PASSWORD:-gardenpass}
      JWT_SECRET:  ${JWT_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
      - frontend_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout:  5s
      retries:  5

  # ── 3. FRONTEND TIER (Nginx + static SPA) ─────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gardenapp_frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout:  5s
      retries:  5
